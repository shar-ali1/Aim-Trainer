<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aim Trainer</title>

    <!-- Load Brython -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/brython/3.10.5/brython.min.js"></script>

    <script>
        document.addEventListener("keydown", function(event) {
            if (event.key === "Escape") {
                window.close();
            }
        });
    </script>

    <style>
        body {
            margin: 0;
            background: #111827;
            overflow: hidden;
            font-family: "Segoe UI", Arial, sans-serif;
            user-select: none;
        }

        button {
            font-family: "Segoe UI", Arial, sans-serif;
            user-select: none;
        }
    </style>
</head>

<body onload="brython()">

    <!-- Click Sound -->
    <audio id="clickSound">
        <source src="thock.mp3" type="audio/mpeg">
    </audio>

    <script type="text/python">
        from browser import document, html, window

        WIDTH, HEIGHT = 800, 600
        DOT_COUNT = 3
        DOT_RADIUS = 50

        points = 0
        streak = 0
        last_click_time = None
        total_reaction_time = 0
        reaction_count = 0

        FAST_LIMIT = 1.00
        display_mode = "stats"
        duration_ms = None

        game_start_time = window.performance.now()
        total_paused_time = 0
        is_paused = False
        pause_start = 0
        is_game_over = False

        container = html.DIV(style={
            "width": f"{WIDTH}px",
            "height": f"{HEIGHT}px",
            "background": "#1e325a",
            "position": "absolute",
            "top": "50%",
            "left": "50%",
            "transform": "translate(-50%, -50%)",
            "overflow": "hidden",
            "user-select": "none"
        })
        document <= container

        stats = html.DIV(style={
            "position": "absolute",
            "top": "18px",
            "left": "18px",
            "color": "white",
            "font-family": "Segoe UI, Arial, sans-serif",
            "font-size": "19px",
            "font-weight": "600",
            "line-height": "30px",
            "letter-spacing": "0.3px",
            "white-space": "pre-line",
            "z-index": "10",
            "background": "rgba(0, 0, 0, 0.22)",
            "padding": "14px 18px",
            "border-radius": "14px",
            "user-select": "none",
            "pointer-events": "none"
        })
        container <= stats

        settings_button = html.BUTTON("⚙", style={
            "position": "absolute",
            "top": "18px",
            "right": "18px",
            "width": "44px",
            "height": "44px",
            "border-radius": "50%",
            "border": "1px solid rgba(255,255,255,0.35)",
            "background": "rgba(0,0,0,0.22)",
            "color": "white",
            "font-size": "22px",
            "cursor": "pointer",
            "z-index": "20",
            "user-select": "none"
        })
        container <= settings_button

        overlay = html.DIV(style={
            "position": "absolute",
            "top": "0",
            "left": "0",
            "width": "100%",
            "height": "100%",
            "background": "rgba(17, 24, 39, 0.58)",
            "display": "none",
            "align-items": "center",
            "justify-content": "center",
            "z-index": "100",
            "user-select": "none"
        })
        container <= overlay

        panel = html.DIV(style={
            "width": "380px",
            "background": "#1e325a",
            "color": "white",
            "font-family": "Segoe UI, Arial, sans-serif",
            "padding": "28px",
            "border-radius": "20px",
            "box-shadow": "0 20px 50px rgba(0,0,0,0.35)",
            "border": "1px solid rgba(255,255,255,0.18)",
            "text-align": "center"
        })
        overlay <= panel

        paused_title = html.DIV("Paused", style={
            "font-size": "32px",
            "font-weight": "700",
            "margin-bottom": "22px",
            "letter-spacing": "0.5px"
        })
        panel <= paused_title

        mode_row = html.DIV(style={
            "display": "flex",
            "gap": "12px",
            "margin-bottom": "16px"
        })
        panel <= mode_row

        simple_button = html.BUTTON("Simple", style={
            "flex": "1",
            "height": "48px",
            "border-radius": "12px",
            "font-size": "16px",
            "font-weight": "700",
            "cursor": "pointer"
        })
        mode_row <= simple_button

        stats_button = html.BUTTON("Stats", style={
            "flex": "1",
            "height": "48px",
            "border-radius": "12px",
            "font-size": "16px",
            "font-weight": "700",
            "cursor": "pointer"
        })
        mode_row <= stats_button

        time_row = html.DIV(style={
            "display": "flex",
            "flex-direction": "column",
            "gap": "10px"
        })
        panel <= time_row

        button_30 = html.BUTTON("30 Seconds", style={
            "height": "46px",
            "border-radius": "12px",
            "font-size": "16px",
            "font-weight": "700",
            "cursor": "pointer"
        })
        time_row <= button_30

        button_60 = html.BUTTON("60 Seconds", style={
            "height": "46px",
            "border-radius": "12px",
            "font-size": "16px",
            "font-weight": "700",
            "cursor": "pointer"
        })
        time_row <= button_60

        button_inf = html.BUTTON("Infinite", style={
            "height": "46px",
            "border-radius": "12px",
            "font-size": "16px",
            "font-weight": "700",
            "cursor": "pointer"
        })
        time_row <= button_inf

        def style_button(button, active):
            if active:
                button.style.background = "#6496ff"
                button.style.border = "1px solid rgba(255,255,255,0.55)"
            else:
                button.style.background = "rgba(255,255,255,0.10)"
                button.style.border = "1px solid rgba(255,255,255,0.22)"

            button.style.color = "white"

        def update_button_styles():
            style_button(simple_button, display_mode == "simple")
            style_button(stats_button, display_mode == "stats")
            style_button(button_30, duration_ms == 30000)
            style_button(button_60, duration_ms == 60000)
            style_button(button_inf, duration_ms == None)

        def random_position():
            dot_size = DOT_RADIUS * 2

            while True:
                x = int(window.Math.random() * (WIDTH - dot_size))
                y = int(window.Math.random() * (HEIGHT - dot_size))

                # Do not let dots spawn under the stats box
                if x < 270 and y < 185:
                    continue

                # Do not let dots spawn under the settings button
                if x > WIDTH - 115 and y < 115:
                    continue

                return x, y

        def elapsed_play_time():
            current_time = window.performance.now()
            paused_time_now = 0

            if is_paused:
                paused_time_now = current_time - pause_start

            return current_time - game_start_time - total_paused_time - paused_time_now

        def time_text():
            if duration_ms == None:
                return "∞"

            remaining = duration_ms - elapsed_play_time()

            if remaining < 0:
                remaining = 0

            return f"{remaining / 1000:.1f}s"

        def average_text():
            if reaction_count == 0:
                return "-"

            average = total_reaction_time / reaction_count
            return f"{int(average)} ms"

        def open_settings(title):
            global is_paused, pause_start

            if not is_paused:
                is_paused = True
                pause_start = window.performance.now()

            paused_title.text = title
            overlay.style.display = "flex"
            update_button_styles()

        def close_settings():
            global is_paused, total_paused_time, last_click_time

            if is_game_over:
                return

            if is_paused:
                pause_length = window.performance.now() - pause_start
                total_paused_time += pause_length

                if last_click_time != None:
                    last_click_time += pause_length

                is_paused = False

            overlay.style.display = "none"
            update_stats()

        def toggle_settings(event):
            if overlay.style.display == "flex":
                close_settings()
            else:
                open_settings("Paused")

        def update_stats():
            global streak, is_game_over

            if not is_paused and not is_game_over and duration_ms != None:
                if elapsed_play_time() >= duration_ms:
                    is_game_over = True
                    open_settings("Time's Up")

            if not is_paused and not is_game_over and last_click_time != None:
                idle_time = (window.performance.now() - last_click_time) / 1000

                if idle_time > FAST_LIMIT:
                    streak = 0

            if display_mode == "simple":
                stats.text = (
                    f"Points: {points}\n"
                    f"Time: {time_text()}"
                )
            else:
                stats.text = (
                    f"Points: {points}\n"
                    f"Streak: {streak}\n"
                    f"Avg Reaction: {average_text()}\n"
                    f"Time: {time_text()}"
                )

        def start_round(new_duration):
            global points, streak, last_click_time, total_reaction_time, reaction_count
            global duration_ms, game_start_time, total_paused_time, is_paused, pause_start, is_game_over

            duration_ms = new_duration
            points = 0
            streak = 0
            last_click_time = None
            total_reaction_time = 0
            reaction_count = 0

            game_start_time = window.performance.now()
            total_paused_time = 0
            pause_start = 0
            is_paused = False
            is_game_over = False
            overlay.style.display = "none"

            for dot in dots:
                x, y = random_position()
                dot.style.left = f"{x}px"
                dot.style.top = f"{y}px"

            update_button_styles()
            update_stats()

        def click_dot(event):
            global points, streak, last_click_time
            global total_reaction_time, reaction_count

            if is_paused or is_game_over:
                return

            current_time = window.performance.now()

            points += 1

            if last_click_time == None:
                streak = 1
            else:
                reaction_time = current_time - last_click_time

                total_reaction_time += reaction_time
                reaction_count += 1

                if reaction_time <= FAST_LIMIT * 1000:
                    streak += 1
                else:
                    streak = 1

            last_click_time = current_time

            dot = event.target
            x, y = random_position()
            dot.style.left = f"{x}px"
            dot.style.top = f"{y}px"

            window.document["clickSound"].play()
            update_stats()

        def set_simple(event):
            global display_mode
            display_mode = "simple"
            update_button_styles()
            update_stats()

        def set_stats(event):
            global display_mode
            display_mode = "stats"
            update_button_styles()
            update_stats()

        def set_30(event):
            start_round(30000)

        def set_60(event):
            start_round(60000)

        def set_infinite(event):
            start_round(None)

        settings_button.bind("click", toggle_settings)
        simple_button.bind("click", set_simple)
        stats_button.bind("click", set_stats)
        button_30.bind("click", set_30)
        button_60.bind("click", set_60)
        button_inf.bind("click", set_infinite)

        dots = []

        for i in range(DOT_COUNT):
            x, y = random_position()

            dot = html.DIV(style={
                "width": f"{DOT_RADIUS * 2}px",
                "height": f"{DOT_RADIUS * 2}px",
                "background": "#6496ff",
                "border-radius": "50%",
                "position": "absolute",
                "left": f"{x}px",
                "top": f"{y}px",
                "box-shadow": "0 0 18px rgba(100, 150, 255, 0.45)",
                "cursor": "crosshair",
                "user-select": "none"
            })

            dot.bind("click", click_dot)
            dots.append(dot)
            container <= dot

        start_round(None)
        window.setInterval(update_stats, 100)
    </script>

</body>
</html>
